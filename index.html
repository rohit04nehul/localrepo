<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Twitter Clone</h1>
        </header>
        <main>
            <section class="tweet-compose">
                <textarea placeholder="What's happening?"></textarea>
                <button>Tweet</button>
            </section>
            <section class="tweets">
                <!-- Individual tweets will go here -->
                <div class="tweet">
                    <img src="profile-pic.jpg" alt="Profile Picture">
                    <div class="tweet-content">
                        <h3>Username</h3>
                        <p>This is a tweet. It can be quite long, so we need to handle that gracefully.</p>
                        <span>Posted 2 hours ago</span>
                    </div>
                </div>
                <!-- More tweets go here -->
            </section>
        </main>
    </div>
</body>
</html>
